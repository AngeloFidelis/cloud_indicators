<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
             margin: 0;
        }
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Remove o scroll */
            font-family: Arial, sans-serif;
        }
        div {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        p {
            font-size: 1.3rem;
            text-align: center;
        }
        h2{
            font-size: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <p>Status</p>
        <h2>{{status}}</h2>
    </div>
</body>
</html>
