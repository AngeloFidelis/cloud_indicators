<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto Formatado</title>
    <style>
        * {
             margin: 0;
        }
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Remove o scroll */
            font-family: Arial, sans-serif;
        }
        div {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);

        }
        h2{
            font-size: 2rem;
            text-align: center;
        }
        #critical {
            color: #f04e4e;
        }
        #high {
            color: #ffab44;
        }
        #medium {
            color: #ddff53;
        }
        #low {
            color: #80E080;
        }
    </style>
</head>
<body>
    <div>
        <h2 id={{id_priority}}>Priority: {{priority}}</h2>
    </div>
</body>
</html>
